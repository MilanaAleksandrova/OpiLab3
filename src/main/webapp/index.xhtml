<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<f:view>
    <h:head>
        <meta charset="UTF-8"/>
        <title>Лабораторная работа #3 — старт</title>
        <link rel="stylesheet" type="text/css" href="#{request.contextPath}/static/css/style.css"/>
    </h:head>
    <h:body styleClass="start-page">
        <div class="start-container">
            <div class="header">
                ФИО: Александрова Милана Сергеевна | Группа: P3214 | Вариант: 3133
            </div>

            <div class="start-content">

                <div class="start-clock">
                    <span class="clock-label">Текущее время:</span>
                    <span id="start-clock-value"></span>
                </div>

                <h:link outcome="app" styleClass="start-link">
                    Перейти к основному приложению
                </h:link>
            </div>
        </div>

        <script type="text/javascript">
            (function () {
                const clockEl = document.getElementById('start-clock-value');

                function updateClock() {
                    if (!clockEl) {
                        return;
                    }
                    const now = new Date();
                    clockEl.textContent = now.toLocaleString('ru-RU');
                }

                updateClock();
                setInterval(updateClock, 11000);
            })();
        </script>
    </h:body>
</f:view>
</html>
